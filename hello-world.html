<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i am king</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(20, 184, 166, 0.28), transparent 34%),
        radial-gradient(circle at 78% 30%, rgba(244, 114, 182, 0.22), transparent 30%),
        linear-gradient(135deg, #0f172a 0%, #111827 46%, #020617 100%);
    }

    main {
      width: min(92vw, 760px);
      padding: 56px 44px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      animation: float-in 800ms ease-out both;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: #5eead4;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.25rem, 10vw, 7.8rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #f8fafc, #5eead4 42%, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 560px;
      margin: 24px auto 0;
      color: #cbd5e1;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      line-height: 1.7;
    }

    .sparkle {
      display: inline-grid;
      place-items: center;
      width: 54px;
      height: 54px;
      margin-top: 34px;
      border-radius: 50%;
      color: #0f172a;
      font-size: 1.4rem;
      font-weight: 900;
      background: #f8fafc;
      box-shadow: 0 0 38px rgba(94, 234, 212, 0.55);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @media (max-width: 520px) {
      main {
        padding: 42px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">First page energy</p>
    <h1>Hello <span>World</span></h1>
    <p>A bright little HTML page, dressed up with soft glass, vivid color, and a tiny bit of motion.</p>
    <div class="sparkle" aria-label="sparkle">*</div>
  </main>
</body>
</html>
