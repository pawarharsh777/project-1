<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      color: #f8fafc;
      background: radial-gradient(circle at 20% 20%, #14b8a644, transparent 32%), linear-gradient(135deg, #0f172a, #020617);
    }
    nav {
      position: fixed;
      top: 22px;
      display: flex;
      gap: 12px;
      padding: 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255,255,255,.14);
    }
    a {
      color: #f8fafc;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover, .active { color: #0f172a; background: #5eead4; }
    main {
      width: min(90vw, 720px);
      padding: 48px;
      text-align: center;
      border-radius: 24px;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 28px 80px rgba(0,0,0,.4);
    }
    h1 { margin: 0; font-size: clamp(3rem, 8vw, 6rem); }
    p { color: #cbd5e1; font-size: 1.15rem; line-height: 1.7; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a class="active" href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main>
    <h1>About</h1>
    <p>This is a small fancy website made with simple HTML and CSS. Clean, bright, and easy to explore.</p>
  </main>
</body>
</html>
